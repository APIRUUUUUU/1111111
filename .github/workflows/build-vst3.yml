name: Build Crystal Voice VST3

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-vst3:
    name: Build Windows VST3
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Configure CMake project
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release VST3
        shell: pwsh
        run: cmake --build build --config Release --target CrystalVoice_VST3

      - name: Package VST3 bundle
        shell: pwsh
        run: |
          $bundle = "build/CrystalVoice_artefacts/Release/VST3/Crystal Voice.vst3"

          if (-not (Test-Path $bundle)) {
            throw "VST3 bundle was not generated at: $bundle"
          }

          Compress-Archive `
            -Path $bundle `
            -DestinationPath "CrystalVoice-VST3-Windows.zip" `
            -Force

      - name: Upload VST3 package
        uses: actions/upload-artifact@v4
        with:
          name: CrystalVoice-VST3-Windows
          path: CrystalVoice-VST3-Windows.zip
          if-no-files-found: error
          retention-days: 30
